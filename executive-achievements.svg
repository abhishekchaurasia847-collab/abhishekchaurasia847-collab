<svg width="440" height="110" viewBox="0 0 440 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Saffron Gradient for S/SSS Ranks -->
    <linearGradient id="saffron_grad" x1="0%" y1="0%" x2="100%" y2="100%">
