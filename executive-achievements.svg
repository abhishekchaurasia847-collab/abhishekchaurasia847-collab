      .message { font: 10.5px "Segoe UI", Ubuntu, Sans-Serif; fill: #8b949e; text-anchor: middle; }
      .points { font: 10px "Segoe UI", Ubuntu, Sans-Serif; fill: #8b949e; text-anchor: middle; }
      .laurel { fill: #178600; opacity: 0.4; }
      .trophy_base { fill: url(#saffron_grad); }
      .rank_bg { fill: #f0f6fb; }
    </style>
  </defs>

